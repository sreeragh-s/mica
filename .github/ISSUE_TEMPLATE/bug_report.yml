name: Bug report
description: Report a reproducible problem in NoteLab
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share the smallest sequence that reproduces the issue.
      placeholder: |
        1. Open...
        2. Click...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: Example: macOS 14.5, Apple Silicon
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: App version, release tag, or commit SHA.
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Does this block startup, risk data loss, affect a single feature, or have a workaround?
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or attach screenshots if helpful.
