name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What workflow is missing, painful, or unclear today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like to see.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Editor
        - Workspace and file tree
        - Wiki links and graph
        - Source control
        - AI chat
        - Meeting recorder
        - Settings or onboarding
        - Build, release, or platform support
        - Documentation
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, screenshots, notes, or examples from similar tools.
