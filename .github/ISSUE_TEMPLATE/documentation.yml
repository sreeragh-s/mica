name: Documentation
description: Report missing, unclear, or outdated documentation
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link to the page, file, or section that needs work.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is missing, confusing, or incorrect?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
