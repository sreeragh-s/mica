name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Build production
        run: npm run build:production
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Asset
        if: success()
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"

          gh release create "$TAG" \
            --title "Release $TAG" \
            --generate-notes \
            ./out/**/*.dmg || true

      - name: Bump Version
        if: success()
        run: |
          npm version patch
          git push --follow-tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  failure:
    needs: build
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify failure
        run: echo "Build failed, version will not be bumped"
